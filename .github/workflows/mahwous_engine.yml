name: 🔬 محرك مهووس للحسم v9.0

on:
  workflow_dispatch:
    inputs:
      use_llm:
        description: 'تفعيل الذكاء الاصطناعي؟'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'input/store/**'
      - 'input/competitors/**'

jobs:
  run-mahwous-engine:
    name: تشغيل محرك مهووس الهجين
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 سحب الكود
        uses: actions/checkout@v4
      - name: 🐍 إعداد Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 📦 تثبيت المكتبات
        run: pip install -r requirements.txt
      - name: 🚀 تشغيل المحرك
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USE_LLM: ${{ github.event.inputs.use_llm || 'true' }}
        run: python run_engine.py
      - name: 📤 رفع النتائج
        uses: actions/upload-artifact@v4
        with:
          name: mahwous-results-${{ github.run_number }}
          path: output/
          retention-days: 30
      - name: 📊 ملخص النتائج
        if: always()
        run: |
          if [ -f output/summary.txt ]; then
            echo "## نتائج محرك مهووس" >> $GITHUB_STEP_SUMMARY
            cat output/summary.txt >> $GITHUB_STEP_SUMMARY
          fi
